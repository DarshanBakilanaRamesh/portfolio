name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/portfolio
            git pull origin main
            docker build -t portfolio-site .
            docker rm -f portfolio || true
            docker run -d --restart unless-stopped --name portfolio -p 80:80 portfolio-site
            sleep 5
            curl --retry 5 --retry-delay 2 --retry-connrefused -I http://localhost
